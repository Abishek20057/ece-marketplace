<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalam Hub Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#08111f;
color:white;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#0f172a;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:24px;
font-weight:800;
}

.logout-btn{
background:#ef4444;
border:none;
padding:10px 18px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:600;
}

.container{
padding:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#111c31;
padding:25px;
border-radius:18px;
border:1px solid rgba(255,255,255,.05);
}

.card h3{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}

.card h1{
font-size:34px;
}

.table-wrapper{
background:#111c31;
border-radius:20px;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#17243d;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-top:1px solid rgba(255,255,255,.05);
}

.pending{
color:#f59e0b;
font-weight:700;
}

.verified{
color:#22c55e;
font-weight:700;
}

.rejected{
color:#ef4444;
font-weight:700;
}

.btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-right:5px;
}

.verify-btn{
background:#22c55e;
color:white;
}

.reject-btn{
background:#ef4444;
color:white;
}

@media(max-width:768px){

.header{
padding:20px;
}

.container{
padding:20px;
}

table{
font-size:13px;
}

}

</style>
</head>
<body>

<div class="header">

<div class="logo">
🚀 Kalam Hub Admin
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="container">

<div class="stats">

<div class="card">
<h3>Total Orders</h3>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h3>Pending Orders</h3>
<h1 id="pendingOrders">0</h1>
</div>

<div class="card">
<h3>Verified Orders</h3>
<h1 id="verifiedOrders">0</h1>
</div>

<div class="card">
<h3>Total Revenue</h3>
<h1 id="totalRevenue">₹0</h1>
</div>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>
<th>Order ID</th>
<th>Name</th>
<th>Component</th>
<th>Amount</th>
<th>UTR</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

<script>

const WEB_APP_URL =
'https://script.google.com/macros/s/AKfycbwVpo-g5IOPpifC6FUx9h4ysxcc6ZF2nvfwZsSWpuXbRlq3uQIAsIhcTVzWYuGzCLbIvA/exec';

if(
sessionStorage.getItem(
'kalam_admin_logged_in'
)!=='1'
){
window.location.href =
'admin-login.html';
}

function logout(){

sessionStorage.clear();

window.location.href =
'admin-login.html';

}

async function loadOrders(){

try{

const response =
await fetch(
WEB_APP_URL +
'?action=getOrders'
);

const data =
await response.json();

renderOrders(data);

}catch(err){

console.error(err);

}

}

function renderOrders(data){

let html='';

let total=0;
let pending=0;
let verified=0;
let revenue=0;

data.forEach(order=>{

total++;

if(order.status==="Pending Verification")
pending++;

if(order.status==="Verified"){
verified++;
revenue += Number(order.amount);
}

html += `

<tr>

<td>${order.orderId}</td>

<td>${order.name}</td>

<td>${order.component}</td>

<td>₹${order.amount}</td>

<td>${order.utr}</td>

<td class="
${order.status==='Verified'
?'verified'
:order.status==='Rejected'
?'rejected'
:'pending'}
">

${order.status}

</td>

<td>

<button
class="btn verify-btn"
onclick="updateStatus(
'${order.orderId}',
'Verified'
)">
Verify
</button>

<button
class="btn reject-btn"
onclick="updateStatus(
'${order.orderId}',
'Rejected'
)">
Reject
</button>

</td>

</tr>

`;

});

document.getElementById(
'totalOrders'
).innerText=total;

document.getElementById(
'pendingOrders'
).innerText=pending;

document.getElementById(
'verifiedOrders'
).innerText=verified;

document.getElementById(
'totalRevenue'
).innerText='₹'+revenue;

document.getElementById(
'ordersTable'
).innerHTML=html;

}

async function updateStatus(
orderId,
status
){

try{

await fetch(
WEB_APP_URL +
'?action=updateStatus'
+
'&orderId=' +
orderId
+
'&status=' +
status
);

loadOrders();

}catch(err){

console.error(err);

}

}

loadOrders();

</script>

</body>
</html>
<!-- Inventory Management -->

<div class="inventory-section">

  <h2>📦 Inventory Management</h2>

  <table class="inventory-table">

    <thead>
      <tr>
        <th>Component</th>
        <th>Stock</th>
        <th>Price (₹)</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="inventoryTable">
    </tbody>

  </table>

</div>
