<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalam Hub Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#08111f;
color:#ffffff;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#0f172a;
border-bottom:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:24px;
font-weight:800;
}

.logout-btn{
background:#ef4444;
color:#fff;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.container{
padding:30px;
}

/* ==========================
   Stats Cards
========================== */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#111c31;
padding:25px;
border-radius:18px;
border:1px solid rgba(255,255,255,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}

.card h1{
font-size:34px;
font-weight:800;
}

/* ==========================
   Orders Section
========================== */

.section-title{
font-size:22px;
font-weight:700;
margin-bottom:15px;
}

.table-wrapper{
background:#111c31;
border-radius:20px;
overflow:hidden;
margin-bottom:35px;
border:1px solid rgba(255,255,255,.05);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#17243d;
padding:15px;
text-align:left;
font-size:14px;
font-weight:700;
}

td{
padding:15px;
border-top:1px solid rgba(255,255,255,.05);
font-size:14px;
}

.pending{
color:#f59e0b;
font-weight:700;
}

.verified{
color:#22c55e;
font-weight:700;
}

.rejected{
color:#ef4444;
font-weight:700;
}

/* ==========================
   Inventory Section
========================== */

.inventory-section{
background:#111c31;
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,.05);
}

.inventory-section h2{
margin-bottom:20px;
}

.inventory-table{
width:100%;
border-collapse:collapse;
}

.inventory-table th{
background:#17243d;
padding:15px;
}

.inventory-table td{
padding:15px;
border-top:1px solid rgba(255,255,255,.05);
}

.stock-btn{
background:#2563eb;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:700;
margin:0 4px;
}

.price-input{
width:100px;
padding:8px;
border:none;
border-radius:8px;
background:#1e293b;
color:#fff;
outline:none;
}

.save-btn{
background:#22c55e;
color:#fff;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

/* ==========================
   Responsive
========================== */

@media(max-width:768px){

.header{
padding:20px;
}

.container{
padding:15px;
}

.logo{
font-size:18px;
}

table{
font-size:12px;
}

th,
td{
padding:10px;
}

.price-input{
width:70px;
}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
🚀 Kalam Hub Admin Dashboard
</div>

<button
class="logout-btn"
onclick="logout()"

>

Logout </button>

</div>

<div class="container">

<!-- ==========================
     STATS
========================== -->

<div class="stats">

<div class="card">
<h3>Total Orders</h3>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h3>Pending Orders</h3>
<h1 id="pendingOrders">0</h1>
</div>

<div class="card">
<h3>Total Components</h3>
<h1 id="totalComponents">0</h1>
</div>

<div class="card">
<h3>Total Revenue</h3>
<h1 id="totalRevenue">₹0</h1>
</div>

</div>

<!-- ==========================
     ORDERS
========================== -->

<h2 class="section-title">
📋 Orders List
</h2>

<div class="table-wrapper">

<table>

<thead>

<tr>
<th>Order ID</th>
<th>Name</th>
<th>Component</th>
<th>Amount</th>
<th>UTR</th>
<th>Status</th>
</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

<!-- ==========================
     INVENTORY
========================== -->

<div class="inventory-section">

<h2>
📦 Inventory Management
</h2>

<table class="inventory-table">

<thead>

<tr>
<th>Component</th>
<th>Stock</th>
<th>Temp Price</th>
<th>Perm Price</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="inventoryTable">

</tbody>

</table>

</div>

</div>

<!-- PART 2 JAVASCRIPT WILL BE ADDED HERE -->

  <script src="js/back-button.js"></script>
</body>
</html>
<script>

const WEB_APP_URL =
'https://script.google.com/macros/s/AKfycbwVpo-g5IOPpifC6FUx9h4ysxcc6ZF2nvfwZsSWpuXbRlq3uQIAsIhcTVzWYuGzCLbIvA/exec';

/* ==========================
   LOGIN CHECK
========================== */

if(
sessionStorage.getItem(
'kalam_admin_logged_in'
)!=='1'
){
window.location.href =
'admin-login.html';
}

function logout(){

sessionStorage.clear();

window.location.href =
'admin-login.html';

}

/* ==========================
   LOAD ORDERS
========================== */

async function loadOrders(){

try{

const response =
await fetch(
WEB_APP_URL +
'?action=getOrders'
);

const orders =
await response.json();

renderOrders(orders);

}catch(err){

console.error(
'Orders Error:',
err
);

}

}

function renderOrders(orders){

let html='';

let totalOrders=0;
let pendingOrders=0;
let revenue=0;

orders.forEach(order=>{

totalOrders++;

if(
order.status ===
'Pending Verification'
){
pendingOrders++;
}

revenue +=
Number(
order.amount || 0
);

html += `

<tr>

<td>${order.orderId}</td>

<td>${order.name}</td>

<td>${order.component}</td>

<td>₹${order.amount}</td>

<td>${order.utr}</td>

<td class="
${order.status === 'Verified'
? 'verified'
: order.status === 'Rejected'
? 'rejected'
: 'pending'}
">
${order.status}
</td>

</tr>

`;

});

document.getElementById(
'totalOrders'
).innerText =
totalOrders;

document.getElementById(
'pendingOrders'
).innerText =
pendingOrders;

document.getElementById(
'totalRevenue'
).innerText =
'₹' + revenue;

document.getElementById(
'ordersTable'
).innerHTML =
html;

}

/* ==========================
   INVENTORY
========================== */

async function loadInventory(){

try{

const response =
await fetch(
WEB_APP_URL +
'?action=getInventory'
);

const items =
await response.json();

renderInventory(items);

}catch(err){

console.error(
'Inventory Error:',
err
);

}

}

function renderInventory(items){

let html='';

document.getElementById(
'totalComponents'
).innerText =
items.length;

items.forEach(item=>{

html += `

<tr>

<td>${item.name}</td>

<td>

<button
class="stock-btn"
onclick="changeStock(${item.id},-1)">
-
</button>

<strong>
${item.stock}
</strong>

<button
class="stock-btn"
onclick="changeStock(${item.id},1)">
+
</button>

</td>

<td>

<input
class="price-input"
id="temp-${item.id}"
value="${item.tempPrice}"
>

</td>

<td>

<input
class="price-input"
id="perm-${item.id}"
value="${item.permPrice}"
>

</td>

<td>

<button
class="save-btn"
onclick="saveInventory(${item.id})">
Save
</button>

</td>

</tr>

`;

});

document.getElementById(
'inventoryTable'
).innerHTML =
html;

}

/* ==========================
   STOCK CHANGE
========================== */

async function changeStock(id,delta){
     console.log("Clicked", id, delta);

  try{

    const res = await fetch(
      WEB_APP_URL,
      {
        method:'POST',
        body:JSON.stringify({
          action:'adjustStock',
          id:id,
          delta:delta
        })
      }
    );

    const data = await res.json();

    console.log('Stock Update:', data);

    loadInventory();

  }catch(err){

    console.error('Stock Error:', err);

  }

}

/* ==========================
   SAVE PRICE
========================== */

async function saveInventory(id){

  try{

    const tempPrice =
      document.getElementById('temp-' + id).value;

    const permPrice =
      document.getElementById('perm-' + id).value;

    const res = await fetch(
      WEB_APP_URL,
      {
        method:'POST',
        body:JSON.stringify({
          action:'updateStock',
          id:id,
          tempPrice:tempPrice,
          permPrice:permPrice
        })
      }
    );

    const data = await res.json();

    console.log('Save Result:', data);

    alert('Inventory Updated');

    loadInventory();

  }catch(err){

    console.error(err);

  }

}


/* ==========================
   INITIAL LOAD
========================== */

loadOrders();
loadInventory();

setInterval(
loadOrders,
30000
);

setInterval(
loadInventory,
30000
);

</script>
