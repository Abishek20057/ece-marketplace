<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Kalam Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <a href="index.html" class="auth-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Kalam<span class="logo-accent">Hub</span></span>
    </a>
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join the Kalam Hub Community</p>
      <form class="auth-form" id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="roll">Roll Number</label>
            <input type="text" id="roll" name="roll" placeholder="2021ECE045" required />
          </div>
          <div class="form-group">
            <label for="year">Year</label>
            <select id="year" name="year">
              <option value="1">I Year</option>
              <option value="2">II Year</option>
              <option value="3">III Year</option>
              <option value="4">IV Year</option>
              <option value="staff">Staff</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@college.edu" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-field">
            <input type="password" id="password" name="password" placeholder="Minimum 8 characters" required />
            <button type="button" class="pw-toggle" onclick="togglePw('password', this)" aria-label="Show password">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <div class="password-field">
            <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required />
            <button type="button" class="pw-toggle" onclick="togglePw('confirm', this)" aria-label="Show password">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>
  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/back-button.js"></script>
</body>
</html>
