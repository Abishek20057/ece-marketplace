<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Kalam Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <a href="index.html" class="auth-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Kalam<span class="logo-accent">Hub</span></span>
    </a>
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Sign in to access your components</p>
      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label for="email">Email or Roll Number</label>
          <input type="text" id="email" name="email" placeholder="e.g. 2021ECE045" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-field">
            <input type="password" id="password" name="password" placeholder="Your password" required />
            <button type="button" class="pw-toggle" onclick="togglePw('password', this)" aria-label="Show password">👁</button>
          </div>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      <p class="auth-switch">Don't have an account? <a href="register.html">Sign Up</a></p>
    </div>
  </div>
  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/back-button.js"></script>
</body>
</html>
